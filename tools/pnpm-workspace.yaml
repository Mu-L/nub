# pnpm-side soak surface + catalog (pnpm reads minimumReleaseAge in MINUTES
# from a workspace yaml ONLY — .npmrc is ignored for it). Managed by
# scripts/soak/soak.mts (`pnpm run soak` / `pnpm run soak:fix`).
#
# This file deliberately lives in tools/, not the repo root: nub treats a
# workspace yaml beside a pnpm lockfile as a workspace-root marker, and one at
# the root redirects the test matrix's older-Node legs through the root
# engines (see ../.npmrc for the full story).

catalog:
  taze: 19.14.1

# Cooldown (minutes) before newly published packages install — value managed
# by soak:fix; the window is SOAK_DAYS in scripts/soak/constants.mts.
minimumReleaseAge: 10080

# Exclusions: bare names / scope globs express standing trust; version pins
# are dated soak bypasses and REQUIRE, on the line above:
#   # published: YYYY-MM-DD | removable: YYYY-MM-DD   (removable = published + 7d)
# `pnpm run soak` rejects unannotated or expired pins (and flow-style [..]
# lists, which the gate can't validate); `soak:fix` prunes expired ones.
# minimumReleaseAgeExclude:
#   # published: 2026-01-01 | removable: 2026-01-08
#   - 'example@1.2.3'
