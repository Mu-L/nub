name: Download stats snapshot

on:
  schedule:
    # Daily at 00:15 UTC — slightly offset from the hour to avoid GH cron pile-ups
    - cron: "15 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    name: Snapshot download counts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Set snapshot timestamp
        id: ts
        run: echo "value=$(date -u +"%Y%m%dT%H%M%SZ")" >> "$GITHUB_OUTPUT"

      - name: Fetch GitHub release download counts
        env:
          GH_TOKEN: ${{ github.token }}
        # Writes /tmp/gh-releases.json: array of { tag, assets: [{ name, download_count }] }
        run: |
          gh api repos/nubjs/nub/releases --paginate \
            --jq '[.[] | {tag: .tag_name, assets: [.assets[] | {name: .name, download_count: .download_count}]}]' \
            > /tmp/gh-releases.json

      - name: Fetch npm download counts
        # npm public downloads API — last-30-days count for @nubjs/nub.
        # Falls back to {} if the package has no data yet (pre-launch).
        run: |
          last30=$(curl -fsSL "https://api.npmjs.org/downloads/point/last-month/@nubjs/nub" 2>/dev/null || echo '{}')
          echo "$last30" > /tmp/npm-counts.json

      - name: Write snapshot
        run: |
          ts="${{ steps.ts.outputs.value }}"
          node - "$ts" <<'EOF'
          const fs = require("fs");
          // `node - "$ts"` puts the `-` stdin marker at argv[1]; the timestamp is argv[2].
          const ts = process.argv[2];
          if (!ts) throw new Error("snapshot timestamp argument missing");
          const gh = JSON.parse(fs.readFileSync("/tmp/gh-releases.json", "utf8"));
          const npm = JSON.parse(fs.readFileSync("/tmp/npm-counts.json", "utf8"));
          const snapshot = {
            timestamp: new Date().toISOString(),
            github_releases: gh,
            npm,
          };
          const outPath = `stats/download-counts/${ts}.json`;
          fs.writeFileSync(outPath, JSON.stringify(snapshot, null, 2) + "\n");
          console.log(`Wrote ${outPath}`);
          EOF

      - name: Commit snapshot to the data branch
        # The snapshot is committed to a dedicated `download-stats-data` branch, never
        # to main. main's "Main" ruleset blocks direct pushes from the Actions bot, and
        # keeping the daily bot commits off main is the intended posture. The branch is
        # created from main on first run if it does not yet exist.
        #
        # NOTE: stats/download-counts/report.mjs reads snapshots from the working tree on
        # the branch it runs on. After this change new snapshots live on
        # `download-stats-data`, so to report over fresh data, check out that branch (or
        # point report.mjs at it). The on-main archive stops updating by design.
        env:
          DATA_BRANCH: download-stats-data
        run: |
          ts="${{ steps.ts.outputs.value }}"
          snap="stats/download-counts/${ts}.json"
          # Preserve the just-written snapshot across the branch switch below.
          cp "$snap" /tmp/snapshot.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Base on the existing data branch if present, else fork a fresh one from the
          # current (main) checkout.
          git fetch origin "$DATA_BRANCH" || true
          if git show-ref --verify --quiet "refs/remotes/origin/$DATA_BRANCH"; then
            git checkout -B "$DATA_BRANCH" "origin/$DATA_BRANCH"
          else
            git checkout -B "$DATA_BRANCH"
          fi

          mkdir -p stats/download-counts
          cp /tmp/snapshot.json "$snap"
          git add "$snap"
          git diff --cached --quiet && echo "No new data, nothing to commit." && exit 0
          git commit -m "stats: download snapshot ${ts}"
          git push origin "$DATA_BRANCH"
